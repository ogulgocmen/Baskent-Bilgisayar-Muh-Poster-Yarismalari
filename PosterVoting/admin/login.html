<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Admin Girişi</title>

    <link rel="stylesheet" href="../css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">

    <h1>Admin Girişi</h1>

    <input
        type="email"
        id="email"
        placeholder="E-posta">

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Şifre">

    <br><br>

    <button id="btnLogin">
        Giriş Yap
    </button>

    <p id="message"></p>

</div>

<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>

</body>
</html>
